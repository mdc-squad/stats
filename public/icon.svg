<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <style>
    .bg { fill: #0e130a; }
    .grid { stroke: #c2b280; opacity: 0.14; }

    .hud { stroke: #d6c7a1; fill: none; }
    .core { fill: #d6c7a1; }

    .text { fill: #e7dfbf; font-family: monospace; font-size: 5.2px; }

    /* КОЛЕЦО КРУТИТ */
    .scanRing {
      transform-origin: 32px 32px;
      animation: scan 2.8s linear infinite;
    }

    @keyframes scan {
      0% { transform: rotate(0deg); opacity: 0.3; }
      50% { opacity: 0.9; }
      100% { transform: rotate(360deg); opacity: 0.3; }
    }

    /* ЗАФИКСИРОВАЛ */
    .lock {
      animation: lock 2.8s ease-in-out infinite;
    }

    @keyframes lock {
      0% { stroke-dasharray: 0 60; opacity: 0.1; }
      40% { opacity: 1; }
      100% { stroke-dasharray: 60 0; opacity: 0.9; }
    }

    /* ВСПЫШКА В ЦЕНТРЕ */
    .flash {
      transform-origin: 32px 32px;
      animation: flash 2.8s ease-in-out infinite;
    }

    @keyframes flash {
      0%, 70% {
        opacity: 0;
        r: 0;
      }
      78% {
        opacity: 1;
        r: 2;
      }
      85% {
        opacity: 0.6;
        r: 10;
      }
      100% {
        opacity: 0;
        r: 18;
      }
    }

    /* ПУЛЬСАЦИЯ ЦЕНТРА */
    .pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.25); opacity: 1; }
    }

    @media (prefers-color-scheme: light) {
      .bg { fill: #e6e2d2; }
      .grid { stroke: #5a5a4a; opacity: 0.22; }
      .hud { stroke: #2b3417; }
      .core { fill: #2b3417; }
      .text { fill: #1d220f; }
    }
  </style>

  <!-- ФОН -->
  <rect width="64" height="64" rx="10" class="bg"/>

  <!-- СЕТОЧКА -->
  <g class="grid" stroke-width="0.5">
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
  </g>

  <!-- КОЛЬЦО КРУТИТЬСЯ -->
  <g class="scanRing" stroke="#d6c7a1" stroke-width="1.1" fill="none">
    <circle cx="32" cy="32" r="16" stroke-dasharray="5 5"/>
  </g>

  <!-- БОКОВУШКИ ТИПА ЗАФИКСИРОВАЛ ЦЕЛЬ-->
  <g class="lock hud" stroke-width="1.4">
    <path d="M14 18 L14 14 L18 14"/>
    <path d="M50 14 L54 14 L54 18"/>
    <path d="M14 46 L14 50 L18 50"/>
    <path d="M50 50 L54 50 L54 46"/>
  </g>

  <!-- ПРИЦЕЛ -->
  <g class="hud" stroke-width="1.2">
    <circle cx="32" cy="32" r="13"/>
    <line x1="32" y1="14" x2="32" y2="50"/>
    <line x1="14" y1="32" x2="50" y2="32"/>
  </g>

  <!-- CENTER CORE -->
  <rect x="30" y="30" width="4" height="4" class="core"/>

  <!-- ВСПЫШКА В ЦЕНТРЕ -->
  <g class="flash">
    <circle cx="32" cy="32" r="2" fill="#d6c7a1"/>
    <circle cx="32" cy="32" r="6" fill="#d6c7a1" opacity="0.4"/>
    <circle cx="32" cy="32" r="10" fill="#d6c7a1" opacity="0.2"/>
    <circle cx="32" cy="32" r="14" fill="#d6c7a1" opacity="0.1"/>
  </g>

  <!-- ПАСХАЛКО -->
  <text x="3" y="10" class="text">029C BD</text>
  <text x="25" y="10" class="text" opacity="0.85">004 023</text>

  <!-- MDC -->
  <text x="33" y="58"
        text-anchor="middle"
        font-family="monospace"
        font-size="30"
        font-weight="700"
        letter-spacing="1.5"
        class="text">
    MDC
  </text>

</svg>
