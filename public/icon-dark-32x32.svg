<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Светлая палитра (Tactical Light) */
    .bg { fill: #E0E0D5; }          /* Светлый костяной/серый */
    .grid { stroke: #C2C2B0; }      /* Приглушенный песочный */
    .hud { stroke: #2D332A; fill: none; } /* Темный NATO Green */
    .lock { stroke: #2D332A; fill: none; }
    .core { fill: #2D332A; }
    .text { fill: #4A4E46; font-family: 'Courier New', monospace; font-size: 3px; }
    .mdc-text { fill: #2D332A; font-family: sans-serif; font-weight: 700; }

    /* Анимация и эффекты */
    .scanRing { stroke: #2D332A; fill: none; opacity: 0.3; }
    .flash-inner { fill: #2D332A; }
    .flash-glow { fill: #2D332A; opacity: 0.15; }
  </style>

  <rect width="64" height="64" rx="10" class="bg"/>

  <g class="grid" stroke-width="0.5">
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
  </g>

  <g class="scanRing" stroke-width="1.1">
    <circle cx="32" cy="32" r="16" stroke-dasharray="5 5"/>
  </g>

  <g class="lock" stroke-width="1.4">
    <path d="M14 18 L14 14 L18 14"/>
    <path d="M14 46 L14 50 L18 50"/>
    <path d="M50 18 L50 14 L46 14"/>
    <path d="M50 46 L50 50 L46 50"/>
  </g>

  <g class="hud" stroke-width="1.2">
    <circle cx="32" cy="32" r="13"/>
    <line x1="32" y1="14" x2="32" y2="50"/>
    <line x1="14" y1="32" x2="50" y2="32"/>
  </g>

  <rect x="30" y="30" width="4" height="4" class="core"/>

  <g class="flash">
    <circle cx="32" cy="32" r="2" class="flash-inner"/>
    <circle cx="32" cy="32" r="6" class="flash-glow"/>
    <circle cx="32" cy="32" r="10" class="flash-glow" opacity="0.05"/>
  </g>

  <text x="3" y="10" class="text">029C BD</text>
  <text x="45" y="10" class="text" opacity="0.85">004 023</text>

  <text x="32" y="61"
        text-anchor="middle"
        font-size="12"
        class="mdc-text">
    MDC
  </text>
</svg>
