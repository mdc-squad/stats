<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <meta http-equiv="refresh" content="5; url=https://mdc-squad.org/">
    <title>Сайт переехал | GRAVE</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
        background: #05070d;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 38%, rgba(225, 147, 31, 0.14), transparent 34%),
          #05070d;
      }

      main {
        width: min(520px, 100%);
        text-align: center;
      }

      img {
        width: 150px;
        height: 150px;
        object-fit: contain;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 7vw, 46px);
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto 28px;
        color: #b8becb;
        font-size: 17px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 24px;
        border: 1px solid #e1931f;
        border-radius: 6px;
        background: #e1931f;
        color: #090b10;
        font-weight: 800;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        background: #f0ad48;
        border-color: #f0ad48;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./grave-emblem.png" alt="GRAVE">
      <h1>Сайт переехал</h1>
      <p>
        Статистика GRAVE теперь доступна по новому адресу.<br>
        Через несколько секунд вы будете перенаправлены автоматически.
      </p>
      <a href="https://mdc-squad.org/">Перейти на mdc-squad.org</a>
    </main>
  </body>
</html>
